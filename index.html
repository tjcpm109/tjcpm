<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TJCPM">
  <link rel="apple-touch-icon" href="https://tjcpm109.github.io/tjcpm/APP%20logo.png">
  <link rel="icon" type="image/png" href="https://tjcpm109.github.io/tjcpm/APP%20logo.png">
  <title>TJCPM 員工系統 V88</title>
  <style>
    /* 核心 UI 樣式：繼承自 DOCTYPE html.docx 的深色旗艦風格 */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg-page:#eaf5f0; --bg-page-alt:#ddeaf8;
      --card-bg:#111827; --card-bg-soft:#1a2333; --card-bg-hover:#1f2a3d; --card-border:#2a3650;
      --blue-main:#3b82f6; --blue-light:#60a5fa; --blue-pale:#1e293b; --blue-border:#3b5375;
      --green-main:#22c58a; --green-light:#34d399; --green-pale:#10241c; --green-border:#1f5c44;
      --accent-red:#f87171; --accent-red-pale:#2a1518; --accent-orange:#fbbf24; --accent-orange-pale:#2a2010;
      --text-primary:#f3f6fa; --text-secondary:#aab4c5; --text-muted:#6b7488;
      --page-text-primary:#1a2e22; --page-text-secondary:#4a6858;
      --shadow:0 2px 10px rgba(17,24,39,0.18); --radius:10px; --radius-lg:16px;
      --fs-body:16px; --fs-label:14px; --fs-btn:16px;
    }
    body { background:var(--bg-page); color:var(--page-text-primary); font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif; min-height:100vh; font-size:var(--fs-body); }
    
    /* 頁面切換、導航與卡片基礎樣式 [all] */
    .header { background:var(--card-bg); border-bottom:2px solid var(--green-border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
    .nav { background:var(--card-bg); border-bottom:1px solid var(--card-border); display:flex; overflow-x:auto; scrollbar-width:none; }
    .nav-tab { padding:13px 16px; font-size:var(--fs-label); color:var(--text-secondary); cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; transition:all 0.2s; font-weight:500; }
    .nav-tab.active { color:var(--blue-light); border-bottom-color:var(--blue-light); background:var(--card-bg-hover); }
    .page { display:none; padding:20px; max-width:700px; margin:0 auto; }
    .page.active { display:block; }
    
    /* 歷史查詢控制列樣式 [V88 新增] */
    .history-ctrl { display:flex; gap:8px; margin-bottom:16px; align-items:center; background:var(--card-bg-soft); padding:10px; border-radius:12px; border:1px solid var(--card-border); }
    .input-field { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius); padding:10px; color:var(--text-primary); font-family:inherit; outline:none; }
    .pw-toggle-btn { background:var(--blue-pale); border:1px solid var(--blue-border); color:var(--blue-light); border-radius:8px; padding:8px 16px; cursor:pointer; font-weight:700; transition:all 0.2s; }
    .pw-toggle-btn:hover { background:var(--blue-main); color:white; }
    
    /* 子頁籤樣式 [V87-v88] */
    .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .subtab-chip { font-size:var(--fs-label); padding:7px 15px; border-radius:20px; background:var(--card-bg); border:1px solid var(--card-border); color:var(--text-secondary); cursor:pointer; transition:all 0.15s; font-weight:500; }
    .subtab-chip.active { background:var(--blue-pale); border-color:var(--blue-light); color:var(--blue-light); font-weight:700; }
    
    /* 打卡紀錄項目與狀態標籤 */
    .record-item { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; box-shadow:var(--shadow); }
    .badge { display:inline-block; font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; }
    .badge-green { background:var(--green-pale); color:var(--green-light); }
    .badge-red { background:var(--accent-red-pale); color:var(--accent-red); }
    .empty-state { text-align:center; padding:40px 20px; color:var(--page-text-secondary); }
    .empty-icon { font-size:38px; margin-bottom:12px; }
    
    /* 登入、按鈕等其餘樣式略（完整包含在部署包中）... */
  </style>
</head>
<body>
  <!-- 略過 Login 介面... [1, 2] -->

  <div id="mainApp" style="display:none">
    <div class="header">
      <div class="header-left"><img src="https://tjcpm109.github.io/tjcpm/logo.png" height="42" /></div>
      <div class="header-right"><span class="header-user" id="headerUser"></span><button class="logout-btn" onclick="doLogout()">登出</button></div>
    </div>
    
    <div class="nav" id="mainNav">
      <div class="nav-tab" id="adminTab" data-tab="admin" style="display:none" onclick="switchTab('admin')">👨‍💼 主管</div>
      <div class="nav-tab active" data-tab="home" onclick="switchTab('home')">🏠 打卡</div>
      <div class="nav-tab" data-tab="records" onclick="switchTab('records')">📋 我的紀錄</div>
      <div class="nav-tab" data-tab="profile" onclick="switchTab('profile')">👤 個人資料</div>
    </div>

    <!-- 我的紀錄頁面：V88 優化結構 -->
    <div class="page" id="page-records">
      <div class="filter-bar">
        <!-- 💡 V88 頁籤更名：打卡紀錄 -->
        <div class="subtab-chip active" id="subtab-detail" onclick="switchRecordSubTab('detail')">打卡紀錄</div>
        <div class="subtab-chip" id="subtab-apply" onclick="switchRecordSubTab('apply')">申請單明細</div>
      </div>

      <!-- 打卡紀錄子頁：加裝月份與下載 [V88] -->
      <div id="recordSubPage-detail">
        <div class="history-ctrl">
          <div style="font-size:var(--fs-label); color:var(--text-secondary); font-weight:bold;">月份</div>
          <input type="month" id="recordMonthPicker" class="input-field" style="flex:1;" onchange="renderAllList()">
          <button onclick="downloadMyRecords()" class="pw-toggle-btn">下載</button>
        </div>
        <div class="record-list" id="allRecordsList"></div>
      </div>
      <!-- 申請單子頁略... [3] -->
    </div>

    <!-- 主管頁面：加裝月份切換 [V88] -->
    <div class="page" id="page-admin">
      <div id="adminQueryResults" style="display:none; margin-top:24px;">
        <div class="history-ctrl" style="background:var(--blue-pale); border-color:var(--blue-border);">
          <div style="font-size:14px; color:var(--blue-main); font-weight:bold;">對帳月份</div>
          <input type="month" id="adminQueryMonthPicker" class="input-field" style="flex:1; border-color:var(--blue-border);" onchange="handleAdminQueryChange()">
          <button onclick="downloadQueryRecords()" class="pw-toggle-btn" style="background:var(--blue-main); color:white; border:none;">下載</button>
        </div>
        <div id="aq-calendar-container"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzNaxh9-4JRaOf7nirPOX9gTWo4n9KrWsuZVlXI7ohamS0HAnKatUToiuDy09kKdSxP/exec';
    let currentUser = JSON.parse(sessionStorage.getItem('tjcpm_user') || 'null');
    let records = JSON.parse(localStorage.getItem('tjcpm_records') || '[]');

    // 💡 V88 全域工具：獲取歷史校正日 [4]
    function getEarliestCheckDate() {
      const correction = currentUser?.quota?.correction;
      return (correction && correction.startDate) ? new Date(correction.startDate.replace(/-/g, '/')) : null;
    }

    function showApp() {
      // 💡 V88 初始化：預設顯示當前月份 [all]
      const now = new Date();
      const curM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('recordMonthPicker').value = curM;
      document.getElementById('adminQueryMonthPicker').value = curM;
      
      document.getElementById('mainApp').style.display = 'block';
      if (currentUser.role === 'admin') switchTab('admin');
      renderAllList();
    }

    // 💡 V88 員工端：歷史數據隔離與過濾渲染 [all, 498]
    function renderAllList() {
      const el = document.getElementById('allRecordsList');
      const selectedMonth = document.getElementById('recordMonthPicker').value;
      const earliestD = getEarliestCheckDate();

      if (earliestD) {
        const earliestM = `${earliestD.getFullYear()}-${String(earliestD.getMonth() + 1).padStart(2, '0')}`;
        if (selectedMonth < earliestM) {
          el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛡️</div><div class="empty-text">校正起始日（${earliestM}）前之歷史紀錄不予呈現</div></div>`;
          return;
        }
      }

      const mine = records.filter(r => r.empId === currentUser?.empId && r.date.startsWith(selectedMonth));
      el.innerHTML = mine.length ? mine.map(r => recordHTML(r)).join('') : '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">該月尚無紀錄</div></div>';
    }

    // 💡 V88 下載核心技術：前端即時 CSV 生成 [all, 396]
    function downloadCSV(filename, dataRows) {
      const csvContent = "\uFEFF" + dataRows.map(e => e.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename + ".csv";
      link.click();
    }

    function downloadMyRecords() {
      const m = document.getElementById('recordMonthPicker').value;
      const mine = records.filter(r => r.empId === currentUser?.empId && r.date.startsWith(m));
      const rows = [["日期", "類型", "時間", "定位", "備註"]];
      mine.forEach(r => rows.push([r.date, r.type, r.time, r.lat ? `${r.lat},${r.lng}` : "", r.remark || ""]));
      downloadCSV(`我的打卡紀錄_${m}`, rows);
    }

    // 餘下主管端下載與對帳日曆邏輯... [all, 171]
    async function handleAdminQueryChange() {
      const empId = document.getElementById('adminQueryUserSelect').value;
      const selectedMonth = document.getElementById('adminQueryMonthPicker').value;
      // 呼叫 GAS 並傳入 selectedMonth 進行日曆渲染 [all]
    }
  </script>
</body>
</html>
