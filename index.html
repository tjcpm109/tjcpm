/* 🔧 核心 JavaScript 連線、同步與出勤異常智慧計算引擎 🔧 */
<script>
let currentUser = null;
let records = [];

// 實時向後端拉取最新的特休、補休餘額與年度假別累加時數
async function syncProfileAndAccumulatedLeaves() {
  try {
    const data = await callGAS({ action: 'getMyStatus', empId: currentUser.empId });
    if (data.status === 'ok') {
      if (data.updates) {
        records = data.updates;
        saveRecords();
      }
      // 💡 關鍵修復：將後端抓回的「年度已結算累計數 (settledAccumulated)」與「額度 (quota)」覆蓋同步至本機 currentUser 緩存
      currentUser.settledAccumulated = data.settledAccumulated;
      currentUser.quota = data.quota;
      currentUser.specialShifts = data.specialShifts || [];
      sessionStorage.setItem('tjcpm_user', JSON.stringify(currentUser));
      
      calcAttendance();
    }
  } catch (e) {
    console.error('拉取雲端考勤餘額與累計失敗:', e);
  }
}

// 💡 輔助函式：判斷時間分秒，轉為當日分鐘數以利計算
function timeToMin(timeStr) {
  if (!timeStr) return 540; // 預設 09:00 (540 分鐘)
  const parts = timeStr.split(':');
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1] || 0, 10);
}

// 💡 輔助函式：將 YYYY-MM-DD 或 YYYY/MM/DD 標準化
function normalizeDate(str) {
  if (!str) return '';
  const clean = str.replace(/-/g, '/');
  const parts = clean.split('/');
  if (parts.length === 3) {
    const y = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10);
    const d = parseInt(parts[2], 10);
    return `${y}/${m}/${d}`;
  }
  return clean;
}

// 💡 輔助函式：取得某日期的排班時段 (優先讀取特別排班，其次採個人預設班別)
function getShiftForDateLocal(dateStrHyphen) {
  const ss = (currentUser && currentUser.specialShifts) || [];
  const match = ss.find(s => s.date === dateStrHyphen && s.status === '同意');
  if (match) {
    return { start: match.startTime || '09:00', end: match.endTime || '18:00' };
  }
  const defaultShiftStr = (currentUser && currentUser.defaultShift) || '09:00-18:00';
  const parts = defaultShiftStr.split('-');
  return {
    start: parts[0] ? parts[0].trim() : '09:00',
    end: parts[1] ? parts[1].trim() : '18:00'
  };
}

// 💡 輔助函式：判斷某天是否落在請假申請區間內
function isDateOnLeave(dateStrHyphen, leaveRecord) {
  const startStr = leaveRecord.date;
  const endStr = leaveRecord.endDate || leaveRecord.date;
  return dateStrHyphen >= startStr && dateStrHyphen <= endStr;
}

// 💡 核心間隔覆蓋演算法：判斷 [targetStart, targetEnd] 是否完全被多個請假區間覆蓋
function isIntervalCovered(targetStart, targetEnd, intervals) {
  const sorted = intervals
    .map(i => [Math.max(targetStart, i[0]), Math.min(targetEnd, i[1])])
    .filter(i => i[0] < i[1])
    .sort((a, b) => a[0] - b[0]);
  
  let currentStart = targetStart;
  for (const [s, e] of sorted) {
    if (s <= currentStart) {
      currentStart = Math.max(currentStart, e);
    } else {
      break;
    }
  }
  return currentStart >= targetEnd;
}

// 👨💼 智慧渲染：個人年度出勤異常清單 (已安全排除被「同意請假」覆蓋的遲到、早退、漏打卡)
function renderYearlyIssues() {
  const el = document.getElementById('yearIssueList');
  if (!el) return;
  if (!currentUser || currentUser.empType === '兼任') {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">兼任同仁不計算漏打卡與遲到/早退</div></div>';
    return;
  }
  
  const correction = currentUser.quota && currentUser.quota.correction;
  let range = getCurrentEmploymentYearRange();
  if (correction && correction.startDate) {
    // 修正正則表達式點號轉義錯誤 (/[-.]/g -> [-\.])
    const corrStart = new Date(String(correction.startDate).replace(/[-.]/g, '/').trim());
    if (corrStart && !isNaN(corrStart.getTime()) && corrStart > range.start) {
      range = { start: corrStart, end: range.end };
    }
  }
  
  const startYear = range.start.getFullYear();
  const startMonth = range.start.getMonth();
  const startDay = range.start.getDate();
  
  const now = new Date();
  const yesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  const endCheckDate = yesterday;
  
  let dIndex = new Date(startYear, startMonth, startDay);
  const issues = [];
  
  const myPunches = records.filter(r => {
    if (!matchEmpId(r.empId, currentUser?.empId)) return false;
    return r.type === '上班' || r.type === '下班';
  });
  
  const mySupps = records.filter(r => {
    if (!matchEmpId(r.empId, currentUser?.empId)) return false;
    return r.type === '補打卡';
  });
  
  const myLeaves = records.filter(r => {
    if (!matchEmpId(r.empId, currentUser?.empId)) return false;
    return r.type === '請假' && r.status === '同意';
  });
  
  // 建立每日打卡字典 (智慧支援補打卡與補點卡合併)
  const dailyPunches = {};
  myPunches.forEach(r => {
    const normD = normalizeDate(r.date);
    if (!dailyPunches[normD]) dailyPunches[normD] = { in: null, out: null };
    if (r.type === '上班') {
      if (!dailyPunches[normD].in || r.time < dailyPunches[normD].in) dailyPunches[normD].in = r.time;
    } else if (r.type === '下班') {
      if (!dailyPunches[normD].out || r.time > dailyPunches[normD].out) dailyPunches[normD].out = r.time;
    }
  });
  
  mySupps.filter(r => r.status === '同意').forEach(r => {
    const normD = normalizeDate(r.date);
    if (!dailyPunches[normD]) dailyPunches[normD] = { in: null, out: null };
    if (r.subType === '上班') dailyPunches[normD].in = r.time;
    if (r.subType === '下班') dailyPunches[normD].out = r.time;
  });
  
  let loopCount = 0;
  const hList = currentUser?.holidayStrings || [];
  const specialShifts = currentUser?.specialShifts || [];
  
  while (dIndex <= endCheckDate && loopCount < 366) {
    loopCount++;
    const dayOfWeek = dIndex.getDay();
    const dateStr = `${dIndex.getFullYear()}-${String(dIndex.getMonth() + 1).padStart(2, '0')}-${String(dIndex.getDate()).padStart(2, '0')}`;
    const dateQueryStr = `${dIndex.getFullYear()}/${dIndex.getMonth() + 1}/${dIndex.getDate()}`; // M/D format
    
    const isHoliday = hList.includes(dateStr);
    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
    const hasSpecialShift = specialShifts.some(s => s.date === dateStr && s.status === '同意');
    const isWorkday = (hasSpecialShift || (!isHoliday && !isWeekend));
    
    if (isWorkday) {
      const punch = dailyPunches[dateQueryStr] || { in: null, out: null };
      const shift = getShiftForDateLocal(dateStr);
      const shiftStartMin = timeToMin(shift.start);
      const shiftEndMin = timeToMin(shift.end);
      
      const dayLeaves = myLeaves.filter(l => isDateOnLeave(dateStr, l));
      const leaveIntervals = dayLeaves.map(l => {
        const sMin = l.date === dateStr ? timeToMin(l.startTime) : shiftStartMin;
        const eMin = (l.endDate || l.date) === dateStr ? timeToMin(l.endTime) : shiftEndMin;
        return [sMin, eMin];
      });
      
      let isLate = false;
      let isEarly = false;
      let missedIn = false;
      let missedOut = false;
      
      if (!punch.in && !punch.out) {
        const covered = isIntervalCovered(shiftStartMin, shiftEndMin, leaveIntervals);
        if (!covered) {
          missedIn = true;
          missedOut = true;
        }
      } else if (!punch.in) {
        const outMin = timeToMin(punch.out);
        const inCovered = isIntervalCovered(shiftStartMin, outMin, leaveIntervals);
        if (!inCovered) {
          missedIn = true;
        }
      } else if (!punch.out) {
        const inMin = timeToMin(punch.in);
        const outCovered = isIntervalCovered(inMin, shiftEndMin, leaveIntervals);
        if (!outCovered) {
          missedOut = true;
        }
      } else {
        const inMin = timeToMin(punch.in);
        const outMin = timeToMin(punch.out);
        
        if (inMin > shiftStartMin) {
          const lateCovered = isIntervalCovered(shiftStartMin, inMin, leaveIntervals);
          if (!lateCovered) {
            isLate = true;
          }
        }
        if (outMin < shiftEndMin) {
          const earlyCovered = isIntervalCovered(outMin, shiftEndMin, leaveIntervals);
          if (!earlyCovered) {
            isEarly = true;
          }
        }
      }
      
      if (missedIn || missedOut || isLate || isEarly) {
        let reason = '';
        if (missedIn && missedOut) reason = '漏上班與下班卡';
        else if (missedIn) reason = '漏上班卡';
        else if (missedOut) reason = '漏下班卡';
        else if (isLate && isEarly) reason = '遲到與早退';
        else if (isLate) reason = `遲到 (${punch.in})`;
        else if (isEarly) reason = `早退 (${punch.out})`;
        
        issues.push({
          date: dateStr,
          inHTML: punch.in ? punch.in : '<span style="color:var(--accent-red); font-weight:bold;">漏卡</span>',
          outHTML: punch.out ? punch.out : '<span style="color:var(--accent-red); font-weight:bold;">漏卡</span>',
          reason: reason
        });
      }
    }
    dIndex.setDate(dIndex.getDate() + 1);
  }
  
  issues.sort((a, b) => b.date.localeCompare(a.date));
  
  let correctionNoteHtml = '';
  if (correction && (correction.initMissed || correction.initLateEarly)) {
    correctionNoteHtml = `<div class="profile-card" style="padding:12px; margin-bottom:12px; border-left:4px solid var(--accent-orange); background:var(--card-bg-soft);"><div style="font-size:13px; color:var(--text-secondary); line-height:1.6;">📌 <b>校正基準</b>（\${correction.startDate} 之前歷史累計，已計入上方年度加總）：漏打卡 <b style="color:var(--accent-red);">\${correction.initMissed || 0}</b> 次、遲到/早退 <b style="color:var(--accent-orange);">\${correction.initLateEarly || 0}</b> 次</div></div>`;
  }
  
  if (issues.length === 0) {
    el.innerHTML = correctionNoteHtml || '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">年度內無出勤異常，表現完美！</div></div>';
    return;
  }
  
  let html = correctionNoteHtml + `<div class="calendar-table-container"><table class="calendar-table"><thead><tr><th>📅 日期</th><th>🟢 上班時間</th><th>🏁 下班時間</th><th>⚠️ 異常類別</th></tr></thead><tbody>`;
  issues.forEach(item => {
    const weekdayStr = ['日', '一', '二', '三', '四', '五', '六'][new Date(item.date).getDay()];
    const dateDisplay = `${item.date.slice(5)} (${weekdayStr})`;
    html += `<tr><td style="font-weight:bold; color:var(--text-secondary);">\${dateDisplay}</td><td>\${item.inHTML}</td><td>\${item.outHTML}</td><td><span class="badge \${item.reason.includes('漏卡') ? 'badge-red' : 'badge-orange'}">\${item.reason}</span></td></tr>`;
  });
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

// 📊 智慧出缺勤統計引擎 (月度/年度即時精算，整合請假豁免)
function calcAttendance() {
  if (!currentUser) return;
  const now = new Date();
  const thisYear = now.getFullYear();
  const thisMonth = now.getMonth() + 1;
  const todayDate = now.getDate();
  const daysInMonth = new Date(thisYear, thisMonth, 0).getDate();
  
  let endDayCheck = daysInMonth;
  if (thisYear === now.getFullYear() && thisMonth === (now.getMonth() + 1)) {
    endDayCheck = todayDate - 1;
  } else if (thisYear > now.getFullYear() || (thisYear === now.getFullYear() && thisMonth > (now.getMonth() + 1))) {
    endDayCheck = 0;
  }
  
  const myRecords = records.filter(r => {
    if (!matchEmpId(r.empId, currentUser?.empId)) return false;
    const d = r.date || r.timestamp;
    if (!d) return false;
    const dt = safeNewDate(d);
    return dt.getFullYear() === thisYear && (dt.getMonth() + 1) === thisMonth;
  });
  
  let otHours = 0;
  const approvedOts = myRecords.filter(r => r.type === '加班' && r.status === '同意');
  approvedOts.forEach(r => {
    if (r.hours) otHours += parseFloat(r.hours);
    else if (r.startTime && r.endTime) {
      const sh = parseInt(r.startTime.split(':')[0], 10);
      const sm = parseInt(r.startTime.split(':')[1] || 0, 10);
      const eh = parseInt(r.endTime.split(':')[0], 10);
      const em = parseInt(r.endTime.split(':')[1] || 0, 10);
      otHours += Math.max(0, (eh * 60 + em - sh * 60 - sm) / 60);
    }
  });
  
  const suppCount = myRecords.filter(r => r.type === '補打卡' && (r.status === '同意' || r.status === '待審')).length;
  
  let leaveHours = 0;
  const approvedLeaves = myRecords.filter(r => r.type === '請假' && r.status === '同意');
  approvedLeaves.forEach(r => {
    leaveHours += calculateLeaveHoursLocal(r, currentUser?.holidayStrings || []);
  });
  
  const dailyPunches = {};
  myRecords.forEach(r => {
    if (r.type === '上班' || r.type === '下班') {
      const normD = normalizeDate(r.date);
      if (!dailyPunches[normD]) dailyPunches[normD] = { in: null, out: null };
      if (r.type === '上班') {
        if (!dailyPunches[normD].in || r.time < dailyPunches[normD].in) dailyPunches[normD].in = r.time;
      } else if (r.type === '下班') {
        if (!dailyPunches[normD].out || r.time > dailyPunches[normD].out) dailyPunches[normD].out = r.time;
      }
    }
  });
  
  myRecords.filter(r => r.type === '補打卡' && r.status === '同意').forEach(r => {
    const normD = normalizeDate(r.date);
    if (!dailyPunches[normD]) dailyPunches[normD] = { in: null, out: null };
    if (r.subType === '上班') dailyPunches[normD].in = r.time;
    if (r.subType === '下班') dailyPunches[normD].out = r.time;
  });
  
  let missedCount = 0;
  let lateCount = 0;
  let earlyCount = 0;
  
  const hList = currentUser?.holidayStrings || [];
  const specialShifts = currentUser?.specialShifts || [];
  const myLeaves = records.filter(r => matchEmpId(r.empId, currentUser?.empId) && r.type === '請假' && r.status === '同意');
  
  if (currentUser.empType !== '兼任') {
    for (let d = 1; d <= endDayCheck; d++) {
      const dateObj = new Date(thisYear, thisMonth - 1, d);
      const dayOfWeek = dateObj.getDay();
      const dateStr = `${thisYear}-${String(thisMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dateQueryStr = `${thisYear}/${thisMonth}/${d}`;
      
      const isHoliday = hList.includes(dateStr);
      const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
      const hasSpecialShift = specialShifts.some(s => s.date === dateStr && s.status === '同意');
      const isWorkday = (hasSpecialShift || (!isHoliday && !isWeekend));
      
      if (isWorkday) {
        const punch = dailyPunches[dateQueryStr] || { in: null, out: null };
        const shift = getShiftForDateLocal(dateStr);
        const shiftStartMin = timeToMin(shift.start);
        const shiftEndMin = timeToMin(shift.end);
        
        const dayLeaves = myLeaves.filter(l => isDateOnLeave(dateStr, l));
        const leaveIntervals = dayLeaves.map(l => {
          const sMin = l.date === dateStr ? timeToMin(l.startTime) : shiftStartMin;
          const eMin = (l.endDate || l.date) === dateStr ? timeToMin(l.endTime) : shiftEndMin;
          return [sMin, eMin];
        });
        
        if (!punch.in && !punch.out) {
          const covered = isIntervalCovered(shiftStartMin, shiftEndMin, leaveIntervals);
          if (!covered) {
            missedCount += 2;
          }
        } else if (!punch.in) {
          const outMin = timeToMin(punch.out);
          const inCovered = isIntervalCovered(shiftStartMin, outMin, leaveIntervals);
          if (!inCovered) {
            missedCount += 1;
          }
        } else if (!punch.out) {
          const inMin = timeToMin(punch.in);
          const outCovered = isIntervalCovered(inMin, shiftEndMin, leaveIntervals);
          if (!outCovered) {
            missedCount += 1;
          }
        } else {
          const inMin = timeToMin(punch.in);
          const outMin = timeToMin(punch.out);
          
          if (inMin > shiftStartMin) {
            const lateCovered = isIntervalCovered(shiftStartMin, inMin, leaveIntervals);
            if (!lateCovered) {
              lateCount += 1;
            }
          }
          if (outMin < shiftEndMin) {
            const earlyCovered = isIntervalCovered(outMin, shiftEndMin, leaveIntervals);
            if (!earlyCovered) {
              earlyCount += 1;
            }
          }
        }
      }
    }
  }
  
  const checkinDays = new Set(myRecords.filter(r => r.type === '上班').map(r => r.date)).size;
  const leaveCount = myRecords.filter(r => r.type === '請假').length;
  
  const attTotalEl = document.getElementById('attTotal');
  const attMissedEl = document.getElementById('attMissed');
  const attLateEl = document.getElementById('attLate');
  const attLeaveEl = document.getElementById('attLeave');
  
  if (attTotalEl) attTotalEl.textContent = checkinDays;
  if (attMissedEl) attMissedEl.textContent = missedCount;
  if (attLateEl) attLateEl.textContent = lateCount;
  if (attLeaveEl) attLeaveEl.textContent = leaveCount;
  
  const mOtEl = document.getElementById('m-ot');
  const mMissEl = document.getElementById('m-miss');
  const mSuppEl = document.getElementById('m-supp');
  const mLateEl = document.getElementById('m-late');
  const mEarlyEl = document.getElementById('m-early');
  const mLeaveEl = document.getElementById('m-leave');
  
  if (mOtEl) mOtEl.textContent = otHours.toFixed(1) + ' h';
  if (mMissEl) mMissEl.textContent = missedCount + ' 次';
  if (mSuppEl) mSuppEl.textContent = suppCount + ' 次';
  if (mLateEl) mLateEl.textContent = lateCount + ' 次';
  if (mEarlyEl) mEarlyEl.textContent = earlyCount + ' 次';
  if (mLeaveEl) mLeaveEl.textContent = leaveHours.toFixed(1) + ' h';
  
  const yOtEl = document.getElementById('y-ot');
  const yMissEl = document.getElementById('y-miss');
  const yLateEarlyEl = document.getElementById('y-lateearly');
  
  let yOtHours = 0;
  let yMissedCount = 0;
  let yLateCount = 0;
  
  if (currentUser && currentUser.settledAccumulated) {
    yOtHours = currentUser.settledAccumulated.yOtHours || 0;
    yMissedCount = currentUser.settledAccumulated.yMissedCount || 0;
    yLateCount = currentUser.settledAccumulated.yLateEarlyCount || 0;
  }
  
  if (currentUser) {
    if (yOtEl) yOtEl.textContent = yOtHours.toFixed(1) + ' h';
    if (yMissEl) yMissEl.textContent = yMissedCount + ' 次';
    if (yLateEarlyEl) yLateEarlyEl.textContent = yLateCount + ' 次';
  }
  if (typeof renderYearlyIssues === 'function') {
    renderYearlyIssues();
  }
}
</script>
</body>
</html>
