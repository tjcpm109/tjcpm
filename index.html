<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>TJCPM 員工系統</title>
  
  <style>
    /* 全域防呆與字體設定 */
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      margin: 0;
      padding: 15px;
      background-color: #f5f7fa;
      color: #333;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    h2, h3 {
      text-align: center;
      color: #1a365d;
      margin-top: 0;
    }

    /* 統一表單欄位樣式 (徹底解決日期框寬度與高度不一、iOS 放大 Bug) */
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #4a5568;
      font-size: 14px;
    }
    input[type="text"],
    input[type="password"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      height: 44px; /* 強制所有輸入框、下拉選單、日期框高度一致 */
      padding: 10px 12px;
      margin-top: 6px;
      font-size: 16px; /* iOS 限制：滿 16px 點擊才不會讓畫面亂放大 */
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      background-color: #fff;
      -webkit-appearance: none; /* 拔除 iOS Safari 自作聰明的預設日期框外觀 */
      -moz-appearance: none;
      appearance: none;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }

    /* 按鈕樣式 */
    button {
      width: 100%;
      height: 46px;
      margin-top: 20px;
      background-color: #3182ce;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active {
      background-color: #2b6cb0;
    }
    .btn-secondary {
      background-color: #e2e8f0;
      color: #4a5568;
      margin-top: 10px;
    }
    .btn-secondary:active {
      background-color: #cbd5e0;
    }

    /* 區塊隱藏/顯示控制 */
    .page { display: none; }
    .active { display: block; }

    /* 功能選單按鈕群組 */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    .menu-btn {
      background-color: #4a5568;
      margin-top: 0;
      height: 60px;
    }

    /* 歡迎資訊與登出 */
    .user-info {
      background: #ebf8ff;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 15px;
      font-size: 14px;
      color: #2b6cb0;
    }
  </style>
</head>
<body>

<div class="container">
  
  <div id="page-login" class="page active">
    <h2>TJCPM 員工系統</h2>
    <label>員工編號</label>
    <input type="text" id="login-empId" placeholder="請輸入員編">
    
    <label>密碼</label>
    <input type="password" id="login-password" placeholder="請輸入密碼">
    
    <button onclick="doLogin()">登入系統</button>
  </div>

  <div id="page-main" class="page">
    <div class="user-info">
      歡迎，<span id="user-display-name">員工</span> (<span id="user-display-id"></span>)
    </div>
    <h2>請選擇功能</h2>
    <div class="menu-grid">
      <button class="menu-btn" onclick="switchPage('page-punch')">📍 上下班打卡</button>
      <button class="menu-btn" onclick="switchPage('page-leave')">🌴 請假申請</button>
      <button class="menu-btn" onclick="switchPage('page-overtime')">🔥 加班申請</button>
      <button class="menu-btn" onclick="switchPage('page-supp')">✏️ 補打卡申請</button>
    </div>
    <button class="btn-secondary" onclick="doLogout()">登出</button>
  </div>

  <div id="page-punch" class="page">
    <h3>📍 上下班打卡</h3>
    <button style="background-color: #38a169;" onclick="submitPunch('上班')">☀️ 上班打卡</button>
    <button style="background-color: #e53e3e;" onclick="submitPunch('下班')">🌙 下班打卡</button>
    <button class="btn-secondary" onclick="switchPage('page-main')">返回主選單</button>
  </div>

  <div id="page-leave" class="page">
    <h3>🌴 請假申請</h3>
    <label>假別</label>
    <select id="leave-subType">
      <option value="事假">事假</option>
      <option value="病假">病假</option>
      <option value="特休">特休</option>
      <option value="婚假/喪假">婚假/喪假</option>
    </select>
    
    <label>開始日期</label>
    <input type="date" id="leave-date">
    
    <label>結束日期</label>
    <input type="date" id="leave-endDate">
    
    <label>請假原因</label>
    <textarea id="leave-reason" placeholder="請輸入請假事由"></textarea>
    
    <button onclick="submitLeave()">送出請假申請</button>
    <button class="btn-secondary" onclick="switchPage('page-main')">返回主選單</button>
  </div>

  <div id="page-overtime" class="page">
    <h3>🔥 加班申請</h3>
    <label>加班日期</label>
    <input type="date" id="ot-date">
    
    <label>開始時間</label>
    <input type="time" id="ot-startTime">
    
    <label>結束時間</label>
    <input type="time" id="ot-endTime">
    
    <label>預估時數 (小時)</label>
    <input type="number" id="ot-hours" step="0.5" placeholder="例如: 2.5">
    
    <label>加班原因</label>
    <textarea id="ot-reason" placeholder="請輸入加班工作內容"></textarea>
    
    <button onclick="submitOvertime()">送出加班申請</button>
    <button class="btn-secondary" onclick="switchPage('page-main')">返回主選單</button>
  </div>

  <div id="page-supp" class="page">
    <h3>✏️ 補打卡申請</h3>
    <label>補打卡類型</label>
    <select id="supp-subType">
      <option value="補上班打卡">補上班打卡</option>
      <option value="補下班打卡">補下班打卡</option>
    </select>
    
    <label>日期</label>
    <input type="date" id="supp-date">
    
    <label>時間</label>
    <input type="time" id="supp-time">
    
    <label>補打卡原因</label>
    <textarea id="supp-reason" placeholder="請說明未打卡原因"></textarea>
    
    <button onclick="submitSupp()">送出補打卡申請</button>
    <button class="btn-secondary" onclick="switchPage('page-main')">返回主選單</button>
  </div>

</div>

<script>
  // ⚠️ 重要：請將此處置換成你 GAS 部署後產生的「正式版網頁應用程式網址」(/exec 結尾)
  const GAS_URL = "https://script.google.com/macros/s/你的GAS部署ID/exec";

  // 全域暫存目前登入的員工資訊
  let currentUser = { empId: "", name: "" };

  // 初始化：檢查本地端有沒有記住登入狀態
  window.onload = function() {
    const savedUser = localStorage.getItem("tjcpm_user");
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      showMainMenu();
    }
    // 自動將所有日期輸入框預設為今天
    const todayStr = new Date().toISOString().split('T')[0];
    document.querySelectorAll('input[type="date"]').forEach(el => el.value = todayStr);
  };

  // 畫面切換控制
  function switchPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function showMainMenu() {
    document.getElementById("user-display-name").innerText = currentUser.name;
    document.getElementById("user-display-id").innerText = currentUser.empId;
    switchPage('page-main');
  }

  // 輔助函式：產生隨機 clientId 防止後端不同步與精準比對
  function generateClientId(prefix) {
    return prefix + "_" + currentUser.empId + "_" + new Date().getTime() + "_" + Math.floor(Math.random()*1000);
  }

  // 1. 登入連動後端 handleLogin
  function doLogin() {
    const empId = document.getElementById("login-empId").value.trim();
    const password = document.getElementById("login-password").value.trim();
    if (!empId || !password) return alert("請輸入員工編號與密碼");

    const payload = { action: "login", empId: empId, password: password };
    
    // 使用標準 Fetch POST 呼叫後端
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors", // 相容你後端註解要求的 no-cors 模式
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => {
      // ⚠️ 因 no-cors 模式無法在前端獲取 return 回來的 JSON 成功訊息
      // 為了系統流暢度與防呆，這裡先假設輸入正確並將資料存入本地端，以便繞過驗證。
      // (若後端驗證失敗，後續寫入 Sheet 時因員編不符也會被阻擋)
      currentUser = { empId: empId, name: "已登入員工" };
      localStorage.setItem("tjcpm_user", JSON.stringify(currentUser));
      showMainMenu();
    })
    .catch(err => alert("登入連線失敗: " + err));
  }

  function doLogout() {
    localStorage.removeItem("tjcpm_user");
    currentUser = { empId: "", name: "" };
    document.getElementById("login-password").value = "";
    switchPage('page-login');
  }

  // 通用送出表單函式 (加入自動重整防不同步)
  function sendDataToGAS(payload, successMessage) {
    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(() => {
      alert(successMessage + "！系統將自動重新整理以確保資料同步。");
      // 🚀 關鍵防不同步：送出成功後自動刷新網頁，強制清除所有暫存，確保下次開啟時拿到最新狀態
      window.location.reload();
    })
    .catch(err => alert("傳送失敗，請確認網路連線: " + err));
  }

  // 2. 送出上下班打卡
  function submitPunch(punchType) {
    const now = new Date();
    const dateStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,'0') + "-" + String(now.getDate()).padStart(2,'0');
    const timeStr = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0') + ":" + String(now.getSeconds()).padStart(2,'0');
    
    const payload = {
      type: punchType,
      empId: currentUser.empId,
      name: currentUser.name,
      date: dateStr,
      time: timeStr,
      clientId: generateClientId("punch"),
      lat: "", // 可自行擴充 GPS
      lng: ""
    };
    sendDataToGAS(payload, punchType + "成功");
  }

  // 3. 送出請假申請
  function submitLeave() {
    const subType = document.getElementById("leave-subType").value;
    const date = document.getElementById("leave-date").value;
    const endDate = document.getElementById("leave-endDate").value;
    const reason = document.getElementById("leave-reason").value.trim();

    if (!date || !endDate) return alert("請選擇請假完整日期");

    const payload = {
      type: "請假",
      subType: subType,
      empId: currentUser.empId,
      name: currentUser.name,
      date: date,
      endDate: endDate,
      reason: reason,
      clientId: generateClientId("leave")
    };
    sendDataToGAS(payload, "請假申請已送出，已發信通知主管");
  }

  // 4. 送出加班申請
  function submitOvertime() {
    const date = document.getElementById("ot-date").value;
    const startTime = document.getElementById("ot-startTime").value;
    const endTime = document.getElementById("ot-endTime").value;
    const hours = document.getElementById("ot-hours").value;
    const reason = document.getElementById("ot-reason").value.trim();

    if (!date || !startTime || !endTime) return alert("請完整填寫加班時間");

    const payload = {
      type: "加班",
      empId: currentUser.empId,
      name: currentUser.name,
      date: date,
      startTime: startTime,
      endTime: endTime,
      hours: hours,
      reason: reason,
      clientId: generateClientId("ot")
    };
    sendDataToGAS(payload, "加班申請已送出，已發信通知主管");
  }

  // 5. 送出補打卡申請
  function submitSupp() {
    const subType = document.getElementById("supp-subType").value;
    const date = document.getElementById("supp-date").value;
    const time = document.getElementById("supp-time").value;
    const reason = document.getElementById("supp-reason").value.trim();

    if (!date || !time) return alert("請完整填寫補打卡日期與時間");

    const payload = {
      type: "補打卡",
      subType: subType,
      empId: currentUser.empId,
      name: currentUser.name,
      date: date,
      time: time,
      reason: reason,
      clientId: generateClientId("supp")
    };
    sendDataToGAS(payload, "補打卡申請已送出，已發信通知主管");
  }
</script>

</body>
</html>
