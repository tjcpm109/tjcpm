<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TJCPM">
<title>TJCPM 員工系統</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-page:#eaf5f0;
  --bg-page-alt:#ddeaf8;
  --card-bg:#111827;
  --card-bg-soft:#1a2333;
  --card-bg-hover:#1f2a3d;
  --card-border:#2a3650;
  --blue-main:#3b82f6;
  --blue-light:#60a5fa;
  --blue-pale:#1e293b;
  --blue-border:#3b5375;
  --blue-text-on-pale:#93c5fd;
  --green-main:#10b981;
  --green-light:#34d399;
  --green-pale:#064e3b;
  --green-border:#0f766e;
  --green-text-on-pale:#a7f3d0;
  --orange-main:#f97316;
  --orange-light:#fb923c;
  --orange-pale:#431407;
  --orange-border:#7c2d12;
  --orange-text-on-pale:#fed7aa;
  --red-main:#ef4444;
  --red-light:#f87171;
  --purple-main:#a855f7;
  --text-primary:#f9fafb;
  --text-muted:#9ca3af;
  --text-dark:#111827;
}

body {
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background-color: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 登入區塊 */
.login-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--card-bg);
  padding: 30px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  border: 1px solid var(--card-border);
}
.login-card h2 { text-align: center; margin-bottom: 24px; color: var(--blue-light); }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
.input-group input {
  width: 100%; padding: 12px; background: var(--card-bg-soft); border: 1px solid var(--card-border);
  border-radius: 8px; color: #fff; font-size: 16px; transition: border 0.2s;
}
.input-group input:focus { outline: none; border-color: var(--blue-main); }
.btn-login {
  width: 100%; padding: 12px; background: var(--blue-main); border: none; border-radius: 8px;
  color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;
}
.btn-login:hover { background: var(--blue-light); }

/* 主介面區塊 */
.main-container { display: none; flex-direction: column; flex: 1; }
header {
  background: var(--card-bg); padding: 16px; display: flex; justify-content: space-between;
  align-items: center; border-bottom: 1px solid var(--card-border); position: sticky; top:0; z-index: 50;
}
.user-info { display: flex; flex-direction: column; }
.user-info .name { font-weight: bold; font-size: 18px; color: var(--blue-light); }
.user-info .role { font-size: 12px; color: var(--text-muted); }
.btn-logout {
  padding: 6px 12px; background: transparent; border: 1px solid var(--red-light);
  color: var(--red-light); border-radius: 6px; cursor: pointer; font-size: 14px;
}
.btn-logout:hover { background: rgba(239,68,68,0.1); }

/* 導覽列 */
.nav-tabs {
  display: flex; background: var(--card-bg-soft); border-bottom: 1px solid var(--card-border);
  overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
}
.nav-tab {
  flex: 1; text-align: center; padding: 14px 10px; color: var(--text-muted); font-size: 15px;
  cursor: pointer; border-bottom: 3px solid transparent; min-width: 80px; transition: all 0.2s;
}
.nav-tab.active { color: var(--blue-light); border-bottom-color: var(--blue-main); font-weight: bold; background: rgba(59,130,246,0.05); }
.nav-tab.admin-only { display: none; }

/* 內頁 */
.page { display: none; padding: 16px; flex: 1; max-width: 800px; width: 100%; margin: 0 auto; color: var(--text-dark); }
.page.active { display: block; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.card h3 { margin-bottom: 16px; font-size: 18px; color: var(--card-bg); border-left: 4px solid var(--blue-main); padding-left: 8px; }

/* 打卡鈕外觀 */
.punch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.btn-punch {
  height: 100px; border-radius: 12px; border: none; color: #fff; font-size: 18px; font-weight: bold;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.1s, opacity 0.2s;
}
.btn-punch:active { transform: scale(0.97); }
.btn-punch.in { background: linear-gradient(135deg, var(--blue-main), #2563eb); }
.btn-punch.out { background: linear-gradient(135deg, var(--orange-main), #ea580c); }
.btn-punch:disabled { background: #9ca3af !important; cursor: not-allowed; opacity: 0.6; }

/* 動作按鈕群組 */
.action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.btn-action {
  padding: 12px 6px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc;
  color: var(--text-dark); font-size: 14px; font-weight: 500; cursor: pointer; text-align: center;
}
.btn-action:hover { background: #f1f5f9; border-color: #94a3b8; }

/* 列表與資料表格 */
.record-item {
  padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;
}
.record-item:last-child { border-bottom: none; }
.record-info { display: flex; flex-direction: column; gap: 4px; }
.record-title { font-weight: 600; color: #1e293b; font-size: 15px; }
.record-time { font-size: 13px; color: #64748b; }
.badge { padding: 4px 8px; border-radius: 9999px; font-size: 12px; font-weight: bold; }
.badge.pending { background: #fef3c7; color: #d97706; }
.badge.approved { background: #d1fae5; color: #059669; }
.badge.rejected { background: #fee2e2; color: #dc2626; }

/* 彈出視窗 (Modal) */
.modal {
  position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100;
}
.modal.open { display: flex; }
.modal-content {
  background: #fff; padding: 24px; border-radius: 16px; width: 100%; max-width: 450px;
  color: var(--text-dark); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
}
.modal-content h3 { margin-bottom: 16px; font-size: 18px; color: #111827; }

/* ★ 修正：將所有表單輸入欄位、日期欄位、下拉選單設定為同寬度與同內距 */
.modal-content input[type="text"],
.modal-content input[type="date"],
.modal-content select,
.modal-content textarea {
  width: 100%; 
  padding: 10px; 
  margin-bottom: 16px; 
  border: 1px solid #cbd5e1; 
  border-radius: 6px; 
  font-size: 15px;
  box-sizing: border-box; /* 確保 padding 不會撐破 100% 寬度 */
}
.modal-content textarea { height: 80px; resize: none; }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
.btn-cancel { padding: 10px 16px; background: #e2e8f0; border: none; border-radius: 6px; cursor: pointer; color: #475569; }
.btn-submit { padding: 10px 16px; background: var(--blue-main); border: none; border-radius: 6px; cursor: pointer; color: #fff; font-weight: bold; }

/* 吐司提示 (Toast) */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(17,24,39,0.9); color: #fff; padding: 12px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 500; z-index: 200; pointer-events: none; opacity: 0;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); text-align: center; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* 審核管理專用 */
.admin-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; margin-bottom: 12px; background: #f8fafc; }
.admin-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: #64748b; }
.admin-card-body { margin-bottom: 12px; color: #1e293b; }
.admin-card-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-approve { padding: 6px 12px; background: var(--green-main); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:13px; }
.btn-approve:hover { background: var(--green-light); }
.btn-reject { padding: 6px 12px; background: var(--red-main); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:13px; }
.btn-reject:hover { background: var(--red-light); }
</style>
</head>
<body>

<div id="login-page" class="login-container">
  <div class="login-card">
    <h2>TJCPM 員工系統</h2>
    <div class="input-group">
      <label for="login-empid">員工工號 (Emp ID)</label>
      <input type="text" id="login-empid" placeholder="請輸入工號，例如: 001">
    </div>
    <button class="btn-login" onclick="login()">登入系統</button>
  </div>
</div>

<div id="main-interface" class="main-container">
  <header>
    <div class="user-info">
      <span class="name" id="user-display-name">員工姓名</span>
      <span class="role" id="user-display-role">職級說明</span>
    </div>
    <button class="btn-logout" onclick="logout()">登出</button>
  </header>

  <nav class="nav-tabs">
    <div class="nav-tab active" data-tab="punch" onclick="switchTab('punch')">首頁打卡</div>
    <div class="nav-tab" data-tab="records" onclick="switchTab('records')">我的紀錄</div>
    <div class="nav-tab admin-only" id="tab-admin" data-tab="admin" onclick="switchTab('admin')">審核管理</div>
  </nav>

  <div id="page-punch" class="page active">
    <div class="card">
      <h3>今日即時打卡</h3>
      <div class="punch-grid">
        <button id="btn-punch-in" class="btn-punch in" onclick="doPunch('上班')">
          <span style="font-size:28px;">☀️</span>
          <span>上班打卡</span>
        </button>
        <button id="btn-punch-out" class="btn-punch out" onclick="doPunch('下班')">
          <span style="font-size:28px;">🌙</span>
          <span>下班打卡</span>
        </button>
      </div>
    </div>
    <div class="card">
      <h3>線上表單申請</h3>
      <div class="action-grid">
        <button class="btn-action" onclick="openModal('leave')">🌴 請假申請</button>
        <button class="btn-action" onclick="openModal('overtime')">🔥 加班申請</button>
        <button class="btn-action" onclick="openModal('supp')">✏️ 補打卡</button>
      </div>
    </div>
  </div>

  <div id="page-records" class="page">
    <div class="card">
      <h3>請假 / 加班 / 補打卡 紀錄狀態</h3>
      <div id="my-records-list">
        <p style="text-align:center; color:#94a3b8; padding:20px;">載入中或無歷史紀錄...</p>
      </div>
    </div>
  </div>

  <div id="page-admin" class="page">
    <div class="card">
      <h3>待審批申請清單</h3>
      <div id="admin-pending-list">
        <p style="text-align:center; color:#94a3b8; padding:20px;">目前沒有需要審核的項目。</p>
      </div>
    </div>
  </div>
</div>

<div id="modal-leave" class="modal">
  <div class="modal-content">
    <h3>🌴 新增請假申請</h3>
    <label>請假日期</label>
    <input type="date" id="leave-date">
    <label>開始時間</label>
    <select id="leave-start"></select>
    <label>結束時間</label>
    <select id="leave-end"></select>
    <label>假別種類</label>
    <select id="leave-type">
      <option value="事假">事假</option>
      <option value="病假">病假</option>
      <option value="特休">特休</option>
      <option value="婚假">婚假</option>
      <option value="喪假">喪假</option>
      <option value="公假">公假</option>
    </select>
    <label>請假事由 / 備註</label>
    <textarea id="leave-reason" placeholder="請輸入請假詳細原因..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('leave')">取消</button>
      <button class="btn-submit" onclick="submitLeave()">送出申請</button>
    </div>
  </div>
</div>

<div id="modal-overtime" class="modal">
  <div class="modal-content">
    <h3>🔥 新增加班申請</h3>
    <label>加班日期</label>
    <input type="date" id="ot-date">
    <label>開始時間</label>
    <select id="ot-start"></select>
    <label>結束時間</label>
    <select id="ot-end"></select>
    <label>加班內容 / 備註</label>
    <textarea id="ot-reason" placeholder="請簡述加班工作內容..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('overtime')">取消</button>
      <button class="btn-submit" onclick="submitOvertime()">送出申請</button>
    </div>
  </div>
</div>

<div id="modal-supp" class="modal">
  <div class="modal-content">
    <h3>✏️ 新增補打卡申請</h3>
    <label>補打卡日期</label>
    <input type="date" id="supp-date">
    <label>希望補登時間</label>
    <select id="supp-time"></select>
    <label>補打卡類別</label>
    <select id="supp-type">
      <option value="上班">補 上班打卡</option>
      <option value="下班">補 下班打卡</option>
    </select>
    <label>補打卡原因說明</label>
    <textarea id="supp-reason" placeholder="例如：公出、忘記打卡..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('supp')">取消</button>
      <button class="btn-submit" onclick="submitSupp()">送出申請</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">提示訊息</div>

<script>
// 佈署後的 Google Apps Script 網址
const GAS_URL = "https://script.google.com/macros/s/AKfycbzNaxh9-4JRaOf7nirPOX9gTWo4n9KrWsuZVlXI7ohamS0HAnKatUToiuDy09kKdSxP/exec";

let currentUser = null;

// 通用 JSONP 呼叫函數
function callGAS(params, callback) {
  const callbackName = 'gas_cb_' + Math.floor(Math.random() * 1000000);
  window[callbackName] = function(data) {
    if(callback) callback(data);
    document.body.removeChild(script);
    delete window[callbackName];
  };
  
  const queryString = Object.keys(params)
    .map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k]))
    .join('&');
    
  const script = document.createElement('script');
  script.src = `${GAS_URL}?${queryString}&callback=${callbackName}`;
  document.body.appendChild(script);
}

// 產生 00:00 - 23:30 的半小時選項
function buildHalfHourOptions() {
  let hhtml = '';
  for (let h = 0; h < 24; h++) {
    for (let m of ['00', '30']) {
      let hh = h < 10 ? '0' + h : h;
      let val = `${hh}:${m}`;
      hhtml += `<option value="${val}">${val}</option>`;
    }
  }
  return hhtml;
}

function populateTimeSelects() {
  ['leave-start', 'leave-end', 'ot-start', 'ot-end', 'supp-time'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = buildHalfHourOptions();
  });
}

// 初始化與自動登入檢查
document.addEventListener('DOMContentLoaded', () => {
  populateTimeSelects();
  
  // ★ 修正：從 localStorage 讀取舊的登入資料，以支援多端或重整同步
  const savedUser = localStorage.getItem('currentUser');
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      setupUIForUser();
      showToast(`歡迎回來，${currentUser.name}！`);
    } catch(e) {
      localStorage.removeItem('currentUser');
    }
  }
});

// 登入功能
function login() {
  const empId = document.getElementById('login-empid').value.trim();
  if (!empId) {
    showToast("請輸入工號！");
    return;
  }
  
  showToast("登入中...");
  callGAS({ action: 'login', empId: empId }, function(res) {
    if (res && res.success) {
      currentUser = res.user;
      // ★ 修正：將登入狀態持久化儲存到本地，防止多地/刷新後需要重複登入
      localStorage.setItem('currentUser', JSON.stringify(currentUser));
      setupUIForUser();
      showToast("登入成功！");
    } else {
      showToast(res ? res.message : "登入失敗，請確認工號是否正確。");
    }
  });
}

// 登出功能
function logout() {
  currentUser = null;
  localStorage.removeItem('currentUser'); // 刪除持久化紀錄
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('main-interface').style.display = 'none';
  document.getElementById('login-empid').value = '';
}

// 登入後的 UI 設定與即時同步
function setupUIForUser() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-interface').style.display = 'flex';
  
  document.getElementById('user-display-name').textContent = currentUser.name;
  document.getElementById('user-display-role').textContent = `工號: ${currentUser.empId} | 職責: ${currentUser.role}`;
  
  // 主管權限控管
  const adminTab = document.getElementById('tab-admin');
  if (currentUser.role === 'admin' || currentUser.role === '主管') {
    adminTab.style.display = 'block';
  } else {
    adminTab.style.display = 'none';
  }
  
  switchTab('punch');
  // ★ 修正：登入成功當下，立即從 Sheet 抓取同步最新紀錄
  loadMyRecords();
}

// 切換頁籤（每次切換至對應分頁時，即時重抓資料同步）
function switchTab(tab) {
  if (tab === 'admin' && !(currentUser && (currentUser.role === 'admin' || currentUser.role === '主管'))) {
    return;
  }
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  
  // ★ 修正：切換到紀錄或審核時，強制觸發拉取最新雲端數據
  if (tab === 'records') loadMyRecords();
  if (tab === 'admin') loadAdminData();
}

function openModal(type) {
  document.getElementById('modal-' + type).classList.add('open');
}
function closeModal(type) {
  document.getElementById('modal-' + type).classList.remove('open');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// 【功能】日常打卡
function doPunch(type) {
  if (!currentUser) return;
  showToast(`${type}打卡傳送中...`);
  
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  
  callGAS({
    action: 'punch',
    empId: currentUser.empId,
    name: currentUser.name,
    type: type,
    date: dateStr,
    time: timeStr
  }, function(res) {
    if (res && res.success) {
      showToast(`${type}打卡成功！時間：${timeStr}`);
    } else {
      showToast("打卡失敗，請重新再試。");
    }
  });
}

// 【表單】送出請假
function submitLeave() {
  const date = document.getElementById('leave-date').value;
  if(!date) { showToast("請選擇日期！"); return; }
  
  callGAS({
    action: 'applyLeave',
    empId: currentUser.empId,
    name: currentUser.name,
    date: date,
    start: document.getElementById('leave-start').value,
    end: document.getElementById('leave-end').value,
    type: document.getElementById('leave-type').value,
    reason: document.getElementById('leave-reason').value
  }, function(res) {
    if(res && res.success) {
      showToast("請假申請已送出！");
      closeModal('leave');
      loadMyRecords();
    } else { showToast("送出失敗"); }
  });
}

// 【表單】送出加班
function submitOvertime() {
  const date = document.getElementById('ot-date').value;
  if(!date) { showToast("請選擇日期！"); return; }
  
  callGAS({
    action: 'applyOvertime',
    empId: currentUser.empId,
    name: currentUser.name,
    date: date,
    start: document.getElementById('ot-start').value,
    end: document.getElementById('ot-end').value,
    reason: document.getElementById('ot-reason').value
  }, function(res) {
    if(res && res.success) {
      showToast("加班申請已送出！");
      closeModal('overtime');
      loadMyRecords();
    } else { showToast("送出失敗"); }
  });
}

// 【表單】送出補打卡
function submitSupp() {
  const date = document.getElementById('supp-date').value;
  if(!date) { showToast("請選擇日期！"); return; }
  
  callGAS({
    action: 'applySupp',
    empId: currentUser.empId,
    name: currentUser.name,
    date: date,
    time: document.getElementById('supp-time').value,
    type: document.getElementById('supp-type').value,
    reason: document.getElementById('supp-reason').value
  }, function(res) {
    if(res && res.success) {
      showToast("補打卡申請已送出！");
      closeModal('supp');
      loadMyRecords();
    } else { showToast("送出失敗"); }
  });
}

// 【同步】讀取我的紀錄（從 GAS 伺服器端動態拉取數據）
function loadMyRecords() {
  if (!currentUser) return;
  const listEl = document.getElementById('my-records-list');
  
  callGAS({ action: 'getMyRecords', empId: currentUser.empId }, function(res) {
    if (!res || !res.success) {
      listEl.innerHTML = '<p style="text-align:center; color:#ef4444; padding:20px;">資料載入失敗</p>';
      return;
    }
    
    let html = '';
    if (res.data.length === 0) {
      html = '<p style="text-align:center; color:#94a3b8; padding:20px;">目前尚無申請紀錄。</p>';
    } else {
      // 依日期時間倒序排列
      res.data.sort((a,b) => new Date(b.timestamp || b.date) - new Date(a.timestamp || a.date));
      
      res.data.forEach(item => {
        let statusBadge = '';
        if (item.status === '待審' || item.status === '待審核') statusBadge = '<span class="badge pending">待審核</span>';
        else if (item.status === '核准' || item.status === '已核准') statusBadge = '<span class="badge approved">已核准</span>';
        else if (item.status === '拒絕' || item.status === '已拒絕') statusBadge = '<span class="badge rejected">已拒絕</span>';
        else statusBadge = `<span class="badge pending">${item.status}</span>`;
        
        let details = '';
        if (item.category === '請假') details = `【${item.type}】${item.start}~${item.end} (${item.reason || '無事由'})`;
        else if (item.category === '加班') details = `${item.start}~${item.end} (${item.reason || '無事由'})`;
        else if (item.category === '補打卡') details = `補${item.type} ${item.time} (${item.reason || '無事由'})`;
        
        html += `
          <div class="record-item">
            <div class="record-info">
              <div class="record-title">${item.category}申請 - ${item.date}</div>
              <div class="record-time">${details}</div>
            </div>
            <div>${statusBadge}</div>
          </div>
        `;
      });
    }
    listEl.innerHTML = html;
  });
}

// 【管理】獲取待審批清單
function loadAdminData() {
  const listEl = document.getElementById('admin-pending-list');
  callGAS({ action: 'getAdminPending' }, function(res) {
    if (!res || !res.success) {
      listEl.innerHTML = '<p style="text-align:center; color:#ef4444; padding:20px;">無法載入審核資料</p>';
      return;
    }
    
    let html = '';
    if (res.data.length === 0) {
      html = '<p style="text-align:center; color:#94a3b8; padding:20px;">目前沒有任何待審核的申請。</p>';
    } else {
      res.data.forEach(item => {
        let details = '';
        if (item.category === '請假') details = `請假種類: ${item.type} | 時間: ${item.start} ~ ${item.end}`;
        else if (item.category === '加班') details = `加班時間: ${item.start} ~ ${item.end}`;
        else if (item.category === '補打卡') details = `補登項目: ${item.type}打卡 | 時間: ${item.time}`;
        
        html += `
          <div class="admin-card" id="admin-card-${item.clientId}">
            <div class="admin-card-header">
              <span>申請人: <b>${item.name}</b> (工號:${item.empId})</span>
              <span>日期: ${item.date}</span>
            </div>
            <div class="admin-card-body">
              <div><b>類別:</b> ${item.category}</div>
              <div><b>詳情:</b> ${details}</div>
              <div><b>事由:</b> ${item.reason || '未填寫'}</div>
            </div>
            <div class="admin-card-actions">
              <button class="btn-reject" onclick="approveRecord('${item.category}', '${item.clientId}', '拒絕')">拒絕</button>
              <button class="btn-approve" onclick="approveRecord('${item.category}', '${item.clientId}', '核准')">核准</button>
            </div>
          </div>
        `;
      });
    }
    listEl.innerHTML = html;
  });
}

// 【管理】審核動作
function approveRecord(category, clientId, status) {
  showToast(`正在提交【${status}】結果...`);
  callGAS({
    action: 'approve',
    category: category,
    clientId: clientId,
    status: status
  }, function(res) {
    if (res && res.success) {
      showToast("審核結果已成功同步至雲端！");
      loadAdminData();
    } else {
      showToast("處理失敗：" + (res ? res.message : "未知的伺服器錯誤"));
    }
  });
}
</script>
