<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TJCPM">
<title>TJCPM 員工系統</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-primary:#0d1117; --bg-secondary:#161b22; --bg-card:#1c2333; --bg-hover:#242d3d;
    --accent-blue:#2f81f7; --accent-green:#3fb950; --accent-red:#f85149;
    --accent-orange:#e3a43e; --accent-purple:#a371f7;
    --text-primary:#e6edf3; --text-secondary:#8b949e; --text-muted:#484f58;
    --border:#30363d; --border-bright:#444c56; --radius:10px; --radius-lg:16px;
  }
  body { background:var(--bg-primary); color:var(--text-primary); font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif; min-height:100vh; }

  /* Login */
  #loginScreen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  .login-logo { background:var(--accent-blue); color:#fff; font-size:22px; font-weight:700; width:72px; height:72px; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; letter-spacing:1px; }
  .login-title { font-size:22px; font-weight:500; margin-bottom:6px; }
  .login-sub { font-size:14px; color:var(--text-secondary); margin-bottom:36px; }
  .login-box { background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px 24px; width:100%; max-width:380px; }
  .login-err { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:var(--radius); padding:10px 14px; font-size:13px; color:var(--accent-red); margin-bottom:16px; display:none; }

  /* Header */
  .header { background:var(--bg-secondary); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo-badge { background:var(--accent-blue); color:#fff; font-size:12px; font-weight:700; padding:4px 9px; border-radius:6px; letter-spacing:0.5px; }
  .header-title { font-size:15px; font-weight:500; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .header-clock { font-size:13px; color:var(--accent-blue); font-variant-numeric:tabular-nums; font-weight:500; }
  .header-user { font-size:12px; color:var(--text-secondary); }
  .logout-btn { font-size:12px; color:var(--accent-red); cursor:pointer; background:none; border:none; font-family:inherit; padding:4px 8px; border-radius:6px; }
  .logout-btn:hover { background:rgba(248,81,73,0.1); }
  .notif-bell { font-size:18px; cursor:pointer; position:relative; }
  .notif-badge { position:absolute; top:-4px; right:-4px; background:var(--accent-red); color:#fff; font-size:9px; font-weight:700; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

  /* Nav */
  .nav { background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; scrollbar-width:none; }
  .nav::-webkit-scrollbar { display:none; }
  .nav-tab { padding:12px 18px; font-size:13px; color:var(--text-secondary); cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; transition:all 0.2s; user-select:none; }
  .nav-tab:hover { color:var(--text-primary); }
  .nav-tab.active { color:var(--accent-blue); border-bottom-color:var(--accent-blue); }

  /* Pages */
  .page { display:none; padding:20px; max-width:700px; margin:0 auto; }
  .page.active { display:block; }

  /* Clock */
  .clock-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px 24px; text-align:center; margin-bottom:16px; }
  .clock-time { font-size:48px; font-weight:300; color:var(--accent-blue); font-variant-numeric:tabular-nums; letter-spacing:-1px; line-height:1; }
  .clock-date { font-size:14px; color:var(--text-secondary); margin-top:8px; }
  .clock-user { font-size:13px; color:var(--text-primary); margin-top:10px; font-weight:500; }

  /* Input */
  .input-group { margin-bottom:16px; }
  .input-label { font-size:12px; color:var(--text-secondary); margin-bottom:6px; display:block; letter-spacing:0.3px; }
  .input-field { width:100%; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius); padding:11px 14px; color:var(--text-primary); font-size:14px; font-family:inherit; transition:border-color 0.2s; outline:none; }
  .input-field:focus { border-color:var(--accent-blue); }
  .input-field::placeholder { color:var(--text-muted); }
  .select-field { width:100%; background:var(--bg-primary); border:1px solid var(--border); border-radius:var(--radius); padding:11px 14px; color:var(--text-primary); font-size:14px; font-family:inherit; outline:none; appearance:none; cursor:pointer; }
  .select-field:focus { border-color:var(--accent-blue); }

  /* Action grid */
  .action-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .action-btn { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 16px; cursor:pointer; text-align:center; transition:all 0.18s; user-select:none; }
  .action-btn:hover { background:var(--bg-hover); border-color:var(--border-bright); transform:translateY(-1px); }
  .action-btn:active { transform:scale(0.97); }
  .action-btn .btn-icon { font-size:28px; margin-bottom:8px; display:block; }
  .action-btn .btn-label { font-size:15px; font-weight:500; }
  .action-btn .btn-sub { font-size:11px; color:var(--text-secondary); margin-top:3px; }
  .btn-checkin { border-top:3px solid var(--accent-green); } .btn-checkin .btn-label { color:var(--accent-green); }
  .btn-checkout { border-top:3px solid var(--accent-red); } .btn-checkout .btn-label { color:var(--accent-red); }
  .btn-leave { border-top:3px solid var(--accent-orange); } .btn-leave .btn-label { color:var(--accent-orange); }
  .btn-overtime { border-top:3px solid var(--accent-purple); } .btn-overtime .btn-label { color:var(--accent-purple); }

  /* GPS */
  .gps-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; display:flex; align-items:center; gap:10px; margin-bottom:12px; font-size:13px; }
  .gps-dot { width:8px; height:8px; border-radius:50%; background:var(--text-muted); flex-shrink:0; transition:background 0.3s; }
  .gps-dot.active { background:var(--accent-green); box-shadow:0 0 6px var(--accent-green); }
  .gps-dot.error { background:var(--accent-red); }
  .gps-text { color:var(--text-secondary); flex:1; }
  .gps-coords { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }

  /* Records */
  .section-title { font-size:12px; color:var(--text-secondary); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:12px; margin-top:4px; display:flex; align-items:center; justify-content:space-between; }
  .record-list { display:flex; flex-direction:column; gap:8px; }
  .record-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; display:flex; align-items:center; gap:14px; }
  .record-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot-green { background:var(--accent-green); } .dot-red { background:var(--accent-red); }
  .dot-orange { background:var(--accent-orange); } .dot-purple { background:var(--accent-purple); }
  .record-info { flex:1; }
  .record-type { font-size:13px; font-weight:500; }
  .record-meta { font-size:11px; color:var(--text-secondary); margin-top:2px; }
  .record-time { font-size:13px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
  .empty-icon { font-size:36px; margin-bottom:12px; }
  .empty-text { font-size:14px; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-lg) var(--radius-lg) 0 0; padding:24px 20px 36px; width:100%; max-width:700px; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-title { font-size:16px; font-weight:500; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
  .modal-close { margin-left:auto; background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:20px; line-height:1; padding:0; }

  /* Buttons */
  .submit-btn { width:100%; padding:13px; border-radius:var(--radius); border:none; font-size:15px; font-weight:500; font-family:inherit; cursor:pointer; margin-top:8px; transition:opacity 0.2s, transform 0.15s; }
  .submit-btn:hover { opacity:0.9; } .submit-btn:active { transform:scale(0.98); }
  .submit-btn.blue { background:var(--accent-blue); color:#fff; }
  .submit-btn.green { background:var(--accent-green); color:#000; }
  .submit-btn.red { background:var(--accent-red); color:#fff; }
  .submit-btn.orange { background:var(--accent-orange); color:#000; }
  .submit-btn.purple { background:var(--accent-purple); color:#fff; }

  /* Toast */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg-card); border:1px solid var(--border-bright); border-radius:50px; padding:10px 20px; font-size:13px; color:var(--text-primary); z-index:300; transition:transform 0.3s ease; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* Badge */
  .badge { display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; letter-spacing:0.3px; }
  .badge-green { background:rgba(63,185,80,0.15); color:var(--accent-green); }
  .badge-red { background:rgba(248,81,73,0.15); color:var(--accent-red); }
  .badge-orange { background:rgba(227,164,62,0.15); color:var(--accent-orange); }
  .badge-purple { background:rgba(163,113,247,0.15); color:var(--accent-purple); }
  .badge-blue { background:rgba(47,129,247,0.15); color:var(--accent-blue); }
  .badge-gray { background:rgba(139,148,158,0.15); color:var(--text-secondary); }

  /* Admin stats */
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
  .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .stat-label { font-size:11px; color:var(--text-secondary); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .stat-value { font-size:28px; font-weight:300; }
  .stat-value span { font-size:13px; color:var(--text-secondary); margin-left:4px; }

  /* Approve row */
  .approve-row { display:flex; gap:8px; margin-top:8px; }
  .approve-btn { font-size:12px; padding:5px 14px; border-radius:6px; border:none; cursor:pointer; font-family:inherit; font-weight:500; transition:opacity 0.2s; }
  .approve-btn:hover { opacity:0.8; }
  .approve-btn.ok { background:rgba(63,185,80,0.15); color:var(--accent-green); border:1px solid rgba(63,185,80,0.3); }
  .approve-btn.reject { background:rgba(248,81,73,0.15); color:var(--accent-red); border:1px solid rgba(248,81,73,0.3); }

  /* Notification panel */
  .notif-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin-bottom:16px; }
  .notif-item { padding:10px 0; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:flex-start; }
  .notif-item:last-child { border-bottom:none; }
  .notif-icon { font-size:20px; flex-shrink:0; }
  .notif-text { font-size:13px; color:var(--text-primary); }
  .notif-time { font-size:11px; color:var(--text-muted); margin-top:3px; }
  .notif-unread { background:rgba(47,129,247,0.08); border-radius:var(--radius); }

  /* Spinner */
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Push notif banner */
  .push-banner { background:rgba(47,129,247,0.1); border:1px solid rgba(47,129,247,0.3); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; font-size:13px; }
  .push-banner button { background:var(--accent-blue); color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer; font-family:inherit; white-space:nowrap; }

  /* Filter bar */
  .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-chip { font-size:12px; padding:5px 12px; border-radius:20px; background:var(--bg-card); border:1px solid var(--border); color:var(--text-secondary); cursor:pointer; transition:all 0.15s; }
  .filter-chip.active { background:rgba(47,129,247,0.15); border-color:var(--accent-blue); color:var(--accent-blue); }

  @media(min-width:600px) { .page { padding:28px 24px; } .clock-time { font-size:60px; } }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <img src="https://tjcpm109.github.io/tjcpm/logo.png" style="width:220px;margin-bottom:20px;" />
  <div class="login-title">員工管理系統</div>
  <div class="login-sub">請登入後使用</div>
  <div class="login-box">
    <div class="login-err" id="loginErr"></div>
    <div class="input-group">
      <label class="input-label">員工編號</label>
      <input class="input-field" id="loginId" placeholder="例：111、114" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()" />
    </div>
    <div class="input-group">
      <label class="input-label">密碼</label>
      <input class="input-field" type="password" id="loginPw" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="submit-btn blue" id="loginBtn" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none">
  <div class="header">
    <div class="header-left">
      <img src="https://tjcpm109.github.io/tjcpm/logo.png" style="height:28px;" />
      <span class="header-title">員工管理系統</span>
    </div>
    <div class="header-right">
      <div class="notif-bell" onclick="switchTab('notifications')" title="通知">
        🔔<span class="notif-badge" id="notifCount" style="display:none">0</span>
      </div>
      <span class="header-user" id="headerUser"></span>
      <span class="header-clock" id="headerClock">--:--:--</span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="nav" id="mainNav">
    <div class="nav-tab active" onclick="switchTab('home')">🏠 打卡</div>
    <div class="nav-tab" onclick="switchTab('records')">📋 我的紀錄</div>
    <div class="nav-tab" onclick="switchTab('leave')">📅 請假</div>
    <div class="nav-tab" onclick="switchTab('overtime')">⏰ 加班</div>
    <div class="nav-tab" onclick="switchTab('notifications')">🔔 通知</div>
    <div class="nav-tab" id="adminTab" style="display:none" onclick="switchTab('admin')">👨‍💼 主管</div>
  </div>

  <!-- Home -->
  <div class="page active" id="page-home">
    <div class="clock-card">
      <div class="clock-time" id="mainClock">00:00:00</div>
      <div class="clock-date" id="mainDate"></div>
      <div class="clock-user" id="clockUser"></div>
    </div>
    <div id="pushBanner" class="push-banner" style="display:none">
      🔔 開啟推播通知，及時收到審批結果
      <button onclick="requestPush()">開啟</button>
    </div>
    <div class="gps-bar">
      <div class="gps-dot" id="gpsDot"></div>
      <span class="gps-text" id="gpsText">取得位置中…</span>
      <span class="gps-coords" id="gpsCoords"></span>
    </div>
    <div style="text-align:right;font-size:12px;margin-bottom:12px;min-height:18px;">
      <span id="syncStatus" style="transition:color 0.3s;"></span>
    </div>
    <div class="action-grid">
      <div class="action-btn btn-checkin" onclick="handleAction('上班')">
        <span class="btn-icon">✅</span>
        <div class="btn-label">上班</div>
        <div class="btn-sub">打卡上班</div>
      </div>
      <div class="action-btn btn-checkout" onclick="handleAction('下班')">
        <span class="btn-icon">🏁</span>
        <div class="btn-label">下班</div>
        <div class="btn-sub">打卡下班</div>
      </div>
      <div class="action-btn btn-leave" onclick="openModal('leave')">
        <span class="btn-icon">📝</span>
        <div class="btn-label">請假</div>
        <div class="btn-sub">申請假單</div>
      </div>
      <div class="action-btn btn-overtime" onclick="openModal('overtime')">
        <span class="btn-icon">🌙</span>
        <div class="btn-label">加班</div>
        <div class="btn-sub">申請加班</div>
      </div>
    </div>
    <p class="section-title">今日紀錄</p>
    <div class="record-list" id="todayList"></div>
  </div>

  <!-- My Records -->
  <div class="page" id="page-records">
    <div class="filter-bar">
      <div class="filter-chip active" onclick="filterRecords('all',this)">全部</div>
      <div class="filter-chip" onclick="filterRecords('上班',this)">上班</div>
      <div class="filter-chip" onclick="filterRecords('下班',this)">下班</div>
      <div class="filter-chip" onclick="filterRecords('請假',this)">請假</div>
      <div class="filter-chip" onclick="filterRecords('加班',this)">加班</div>
    </div>
    <div class="record-list" id="allRecordsList"></div>
  </div>

  <!-- Leave -->
  <div class="page" id="page-leave">
    <p class="section-title">請假申請</p>
    <div class="input-group">
      <label class="input-label">假別</label>
      <select class="select-field" id="leaveType">
        <option>特休</option><option>事假</option><option>病假</option>
        <option>公假</option><option>婚假</option><option>喪假</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">開始日期</label>
      <input type="date" class="input-field" id="leaveStart" />
    </div>
    <div class="input-group">
      <label class="input-label">結束日期</label>
      <input type="date" class="input-field" id="leaveEnd" />
    </div>
    <div class="input-group">
      <label class="input-label">原因（選填）</label>
      <input class="input-field" id="leaveReason" placeholder="請假原因" />
    </div>
    <button class="submit-btn orange" onclick="submitLeave()">送出請假申請</button>
  </div>

  <!-- Overtime -->
  <div class="page" id="page-overtime">
    <p class="section-title">加班申請</p>
    <div class="input-group">
      <label class="input-label">加班日期</label>
      <input type="date" class="input-field" id="otDate" />
    </div>
    <div class="input-group">
      <label class="input-label">開始時間</label>
      <input type="time" class="input-field" id="otStart" />
    </div>
    <div class="input-group">
      <label class="input-label">結束時間</label>
      <input type="time" class="input-field" id="otEnd" />
    </div>
    <div class="input-group">
      <label class="input-label">加班原因</label>
      <input class="input-field" id="otReason" placeholder="加班原因" />
    </div>
    <button class="submit-btn purple" onclick="submitOvertime()">送出加班申請</button>
  </div>

  <!-- Notifications -->
  <div class="page" id="page-notifications">
    <p class="section-title">通知中心</p>
    <div id="notifList"></div>
  </div>

  <!-- Admin -->
  <div class="page" id="page-admin">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">今日上班</div>
        <div class="stat-value" id="statCheckin">—<span>人</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日下班</div>
        <div class="stat-value" id="statCheckout">—<span>人</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">待審請假</div>
        <div class="stat-value" id="statLeave">—<span>筆</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">待審加班</div>
        <div class="stat-value" id="statOT">—<span>筆</span></div>
      </div>
    </div>

    <!-- Pending approvals -->
    <div id="pendingSection">
      <p class="section-title">待審核 <span id="pendingLoading" style="color:var(--accent-blue);font-size:11px;font-weight:400;"></span></p>
      <div class="record-list" id="pendingList"></div>
    </div>

    <p class="section-title" style="margin-top:20px;">所有打卡紀錄</p>
    <div class="record-list" id="adminRecords"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-leave">
  <div class="modal">
    <div class="modal-title">📝 請假申請<button class="modal-close" onclick="closeModal('leave')">×</button></div>
    <div class="input-group">
      <label class="input-label">假別</label>
      <select class="select-field" id="modalLeaveType">
        <option>特休</option><option>事假</option><option>病假</option><option>公假</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">日期</label>
      <input type="date" class="input-field" id="modalLeaveDate" />
    </div>
    <button class="submit-btn orange" onclick="quickLeave()">確認送出</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overtime">
  <div class="modal">
    <div class="modal-title">🌙 加班申請<button class="modal-close" onclick="closeModal('overtime')">×</button></div>
    <div class="input-group">
      <label class="input-label">加班時數</label>
      <select class="select-field" id="modalOTHours">
        <option>1 小時</option><option>2 小時</option><option>3 小時</option>
        <option>4 小時</option><option>5 小時</option><option>6 小時</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">原因</label>
      <input class="input-field" id="modalOTReason" placeholder="加班原因" />
    </div>
    <button class="submit-btn purple" onclick="quickOvertime()">確認送出</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzNaxh9-4JRaOf7nirPOX9gTWo4n9KrWsuZVlXI7ohamS0HAnKatUToiuDy09kKdSxP/exec';

let currentUser = JSON.parse(sessionStorage.getItem('tjcpm_user') || 'null');
let records = JSON.parse(localStorage.getItem('tjcpm_records') || '[]');
let notifications = JSON.parse(localStorage.getItem('tjcpm_notif') || '[]');
let gpsLat = null, gpsLng = null;
let currentFilter = 'all';
const todayStr = new Date().toISOString().split('T')[0];

// ── Boot ──────────────────────────────────────────────────
if (currentUser) showApp(); else showLogin();

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'block';
  document.getElementById('headerUser').textContent = currentUser.name;
  document.getElementById('clockUser').innerHTML = `👤 ${currentUser.name} <span class="badge badge-blue">${currentUser.empId}</span>`;
  ['leaveStart','leaveEnd','otDate','modalLeaveDate'].forEach(id => { const el=document.getElementById(id); if(el) el.value=todayStr; });
  initGPS();
  renderTodayList();
  renderAllList();
  updateNotifBadge();
  // Show push banner if not set
  if (Notification && Notification.permission === 'default') {
    document.getElementById('pushBanner').style.display = 'flex';
  }
  // Poll for approval updates every 60s
  if (currentUser.role !== 'admin') setInterval(checkApprovalUpdates, 60000);
}

// ── Login ─────────────────────────────────────────────────
async function doLogin() {
  const empId = document.getElementById('loginId').value.trim();
  const password = document.getElementById('loginPw').value;
  if (!empId || !password) { showLoginErr('請輸入員工編號和密碼'); return; }
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span>驗證中…'; btn.disabled = true;
  document.getElementById('loginErr').style.display = 'none';
  try {
    const res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'login', empId, password}) });
    const data = await res.json();
    if (data.status === 'ok') {
      currentUser = { empId: data.empId, name: data.name, role: data.role };
      sessionStorage.setItem('tjcpm_user', JSON.stringify(currentUser));
      showApp();
    } else { showLoginErr('帳號或密碼錯誤，請再試一次'); }
  } catch(e) { showLoginErr('連線失敗，請確認網路後再試'); }
  btn.innerHTML = '登入'; btn.disabled = false;
}
function showLoginErr(msg) { const el=document.getElementById('loginErr'); el.textContent=msg; el.style.display='block'; }
function doLogout() {
  sessionStorage.removeItem('tjcpm_user'); currentUser = null; showLogin();
  document.getElementById('loginId').value=''; document.getElementById('loginPw').value='';
  document.getElementById('loginErr').style.display='none';
}

// ── Clock ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('zh-TW',{hour12:false});
  const d = now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('mainClock').textContent = t;
  document.getElementById('mainDate').textContent = d;
  document.getElementById('headerClock').textContent = t;
}
setInterval(updateClock, 1000); updateClock();

// ── GPS ───────────────────────────────────────────────────
function initGPS() {
  if (!navigator.geolocation) { setGPS('error','不支援 GPS',''); return; }
  navigator.geolocation.watchPosition(
    p => { gpsLat=p.coords.latitude.toFixed(5); gpsLng=p.coords.longitude.toFixed(5); setGPS('active','GPS 已定位',`${gpsLat}, ${gpsLng}`); },
    () => setGPS('error','GPS 定位失敗','請允許位置存取')
  );
}
function setGPS(state,text,coords) {
  const dot=document.getElementById('gpsDot');
  dot.className='gps-dot'+(state==='active'?' active':state==='error'?' error':'');
  document.getElementById('gpsText').textContent=text;
  document.getElementById('gpsCoords').textContent=coords;
}

// ── Sync ──────────────────────────────────────────────────
async function syncToSheet(record) {
  const el = document.getElementById('syncStatus');
  if(el){el.textContent='☁️ 同步中…';el.style.color='var(--accent-blue)';}
  try {
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});
    if(el){el.textContent='✅ 已同步雲端';el.style.color='var(--accent-green)';}
    setTimeout(()=>{if(el)el.textContent='';},3000);
  } catch(e) {
    if(el){el.textContent='⚠️ 離線（本機已儲存）';el.style.color='var(--accent-orange)';}
    setTimeout(()=>{if(el)el.textContent='';},4000);
  }
}

// ── Push Notifications ────────────────────────────────────
async function requestPush() {
  if (!('Notification' in window)) { showToast('此裝置不支援通知'); return; }
  const perm = await Notification.requestPermission();
  document.getElementById('pushBanner').style.display = 'none';
  if (perm === 'granted') {
    showToast('✅ 推播通知已開啟');
    addNotification('system','🔔 通知已開啟，審批結果將即時通知您');
  } else {
    showToast('⚠️ 未允許通知權限');
  }
}

function sendPushNotif(title, body) {
  if (Notification && Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'https://tjcpm109.github.io/tjcpm/icon.png' });
  }
}

function addNotification(type, message) {
  const notif = { id: Date.now(), type, message, time: new Date().toISOString(), read: false };
  notifications.unshift(notif);
  if (notifications.length > 50) notifications = notifications.slice(0, 50);
  localStorage.setItem('tjcpm_notif', JSON.stringify(notifications));
  updateNotifBadge();
}

function updateNotifBadge() {
  const unread = notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notifCount');
  if (unread > 0) { badge.textContent = unread > 9 ? '9+' : unread; badge.style.display = 'flex'; }
  else { badge.style.display = 'none'; }
}

function renderNotifications() {
  notifications.forEach(n => n.read = true);
  localStorage.setItem('tjcpm_notif', JSON.stringify(notifications));
  updateNotifBadge();
  const el = document.getElementById('notifList');
  if (!notifications.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔕</div><div class="empty-text">目前沒有通知</div></div>';
    return;
  }
  el.innerHTML = notifications.map(n => `
    <div class="notif-panel" style="margin-bottom:8px;padding:12px 16px;">
      <div class="notif-item" style="border:none;padding:0;">
        <div class="notif-icon">${n.type==='approve'?'✅':n.type==='reject'?'❌':n.type==='pending'?'⏳':'🔔'}</div>
        <div>
          <div class="notif-text">${n.message}</div>
          <div class="notif-time">${new Date(n.time).toLocaleString('zh-TW')}</div>
        </div>
      </div>
    </div>`).join('');
}

// ── Check for approval updates (poll) ─────────────────────
async function checkApprovalUpdates() {
  try {
    const res = await fetch(`${GAS_URL}?action=getMyStatus&empId=${currentUser.empId}`);
    const data = await res.json();
    if (data.status === 'ok' && data.updates) {
      data.updates.forEach(u => {
        const existing = records.find(r => r.serverRef === u.ref);
        if (existing && existing.status !== u.status) {
          existing.status = u.status;
          const approved = u.status === '同意';
          const msg = `您的${u.type}申請（${u.date}）已${approved?'核准':'拒絕'}`;
          addNotification(approved?'approve':'reject', msg);
          sendPushNotif(`TJCPM 審批結果`, msg);
          saveRecords();
          renderAllList();
        }
      });
    }
  } catch(e) { /* offline, skip */ }
}

// ── Actions ───────────────────────────────────────────────
function handleAction(type) {
  if (!currentUser) return;
  const now = new Date();
  const record = {
    id: Date.now(), type, empId: currentUser.empId, name: currentUser.name,
    time: now.toLocaleTimeString('zh-TW',{hour12:false}),
    date: now.toLocaleDateString('zh-TW'),
    timestamp: now.toISOString(), lat: gpsLat, lng: gpsLng
  };
  records.unshift(record); saveRecords(); renderTodayList(); renderAllList();
  syncToSheet(record);
  addNotification('system', `${type}打卡成功 ${record.time}${gpsLat?' 📍'+gpsLat+','+gpsLng:''}`);
  showToast(type==='上班'?'✅ 上班打卡成功':'👋 下班打卡成功');
}

function submitLeave() {
  const record = { id:Date.now(), type:'請假', subType:document.getElementById('leaveType').value,
    empId:currentUser.empId, name:currentUser.name,
    date:document.getElementById('leaveStart').value, endDate:document.getElementById('leaveEnd').value,
    reason:document.getElementById('leaveReason').value, status:'待審', timestamp:new Date().toISOString() };
  records.unshift(record); saveRecords(); renderAllList(); syncToSheet(record);
  addNotification('pending',`請假申請已送出（${record.subType} ${record.date}），等待主管審核`);
  showToast('📝 請假申請已送出');
}

function submitOvertime() {
  const record = { id:Date.now(), type:'加班',
    empId:currentUser.empId, name:currentUser.name,
    date:document.getElementById('otDate').value,
    startTime:document.getElementById('otStart').value,
    endTime:document.getElementById('otEnd').value,
    reason:document.getElementById('otReason').value,
    status:'待審', timestamp:new Date().toISOString() };
  records.unshift(record); saveRecords(); renderAllList(); syncToSheet(record);
  addNotification('pending',`加班申請已送出（${record.date}），等待主管審核`);
  showToast('🌙 加班申請已送出');
}

function quickLeave() {
  const record = { id:Date.now(), type:'請假', subType:document.getElementById('modalLeaveType').value,
    empId:currentUser.empId, name:currentUser.name,
    date:document.getElementById('modalLeaveDate').value, status:'待審', timestamp:new Date().toISOString() };
  records.unshift(record); saveRecords(); renderTodayList(); renderAllList(); syncToSheet(record);
  addNotification('pending',`請假申請已送出（${record.subType} ${record.date}），等待主管審核`);
  closeModal('leave'); showToast('📝 請假申請已送出');
}

function quickOvertime() {
  const record = { id:Date.now(), type:'加班',
    empId:currentUser.empId, name:currentUser.name,
    hours:document.getElementById('modalOTHours').value,
    reason:document.getElementById('modalOTReason').value,
    date:todayStr, status:'待審', timestamp:new Date().toISOString() };
  records.unshift(record); saveRecords(); renderTodayList(); renderAllList(); syncToSheet(record);
  addNotification('pending',`加班申請已送出（${record.date} ${record.hours}），等待主管審核`);
  closeModal('overtime'); showToast('🌙 加班申請已送出');
}

// ── Admin: Approve / Reject ───────────────────────────────
async function approveRecord(id, decision) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  rec.status = decision;
  saveRecords();
  const msg = `已${decision}：${rec.name}（${rec.empId}）的${rec.type}申請（${rec.date}）`;
  addNotification(decision==='同意'?'approve':'reject', msg);
  sendPushNotif('TJCPM 審批', msg);
  // Sync decision to sheet
  try {
    await fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ action:'approve', id, empId:rec.empId, type:rec.type, date:rec.date, decision }) });
  } catch(e) {}
  showToast(decision==='同意'?'✅ 已核准':'❌ 已拒絕');
  loadAdminData();
}

// ── Render ────────────────────────────────────────────────
function renderTodayList() {
  const today = new Date().toLocaleDateString('zh-TW');
  const mine = records.filter(r => r.empId===currentUser?.empId && (r.date===today||new Date(r.timestamp).toLocaleDateString('zh-TW')===today));
  const el = document.getElementById('todayList');
  el.innerHTML = mine.length ? mine.map(r=>recordHTML(r)).join('') : '<div class="empty-state"><div class="empty-icon">🕐</div><div class="empty-text">今日尚無紀錄</div></div>';
}

function filterRecords(type, chip) {
  currentFilter = type;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  renderAllList();
}

function renderAllList() {
  let mine = records.filter(r => r.empId===currentUser?.empId);
  if (currentFilter !== 'all') mine = mine.filter(r => r.type===currentFilter);
  const el = document.getElementById('allRecordsList');
  el.innerHTML = mine.length ? mine.map(r=>recordHTML(r)).join('') : '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">尚無紀錄</div></div>';
}

function recordHTML(r, showName=false, showApprove=false) {
  let dotClass='dot-green', badge='';
  if (r.type==='上班'){dotClass='dot-green';badge='<span class="badge badge-green">上班</span>';}
  else if(r.type==='下班'){dotClass='dot-red';badge='<span class="badge badge-red">下班</span>';}
  else if(r.type==='請假'){dotClass='dot-orange';badge=`<span class="badge badge-orange">${r.subType||'請假'}</span>`;}
  else if(r.type==='加班'){dotClass='dot-purple';badge='<span class="badge badge-purple">加班</span>';}
  let statusBadge = '';
  if (r.status==='待審') statusBadge='<span class="badge badge-gray" style="margin-left:4px;">待審</span>';
  else if(r.status==='同意') statusBadge='<span class="badge badge-green" style="margin-left:4px;">✓ 同意</span>';
  else if(r.status==='拒絕') statusBadge='<span class="badge badge-red" style="margin-left:4px;">✗ 拒絕</span>';
  const meta = [r.date||'', r.lat?`📍${r.lat},${r.lng}`:'', r.hours||'', r.reason||''].filter(Boolean).join(' · ');
  const who = showName ? `${r.name||r.empId}（${r.empId}）` : `員工 ${r.empId}`;
  const approveRow = showApprove && r.status==='待審' ? `
    <div class="approve-row">
      <button class="approve-btn ok" onclick="approveRecord(${r.id},'同意')">✓ 核准</button>
      <button class="approve-btn reject" onclick="approveRecord(${r.id},'拒絕')">✗ 拒絕</button>
    </div>` : '';
  return `<div class="record-item" style="flex-direction:column;align-items:flex-start;gap:8px;">
    <div style="display:flex;align-items:center;gap:14px;width:100%;">
      <div class="record-dot ${dotClass}"></div>
      <div class="record-info">
        <div class="record-type">${badge}${statusBadge} ${showName?who:''}</div>
        <div class="record-meta">${meta}</div>
      </div>
      <div class="record-time">${r.time||''}</div>
    </div>
    ${approveRow}
  </div>`;
}

// ── Admin ─────────────────────────────────────────────────
async function loadAdminData() {
  document.getElementById('pendingLoading').textContent = '載入中…';
  // Pending from local records
  const pending = records.filter(r => r.status==='待審' && (r.type==='請假'||r.type==='加班'));
  document.getElementById('statLeave').innerHTML = records.filter(r=>r.type==='請假'&&r.status==='待審').length+'<span>筆</span>';
  document.getElementById('statOT').innerHTML = records.filter(r=>r.type==='加班'&&r.status==='待審').length+'<span>筆</span>';
  const pendingEl = document.getElementById('pendingList');
  pendingEl.innerHTML = pending.length
    ? pending.map(r=>recordHTML(r,true,true)).join('')
    : '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">沒有待審項目</div></div>';
  // Load cloud punch records
  try {
    const res = await fetch(`${GAS_URL}?action=getAll`);
    const data = await res.json();
    document.getElementById('pendingLoading').textContent = '';
    if (data.data && data.data.length > 1) {
      const rows = data.data.slice(1).reverse();
      const today = new Date().toLocaleDateString('zh-TW');
      document.getElementById('statCheckin').innerHTML = rows.filter(r=>r[3]==='上班'&&new Date(r[0]).toLocaleDateString('zh-TW')===today).length+'<span>人</span>';
      document.getElementById('statCheckout').innerHTML = rows.filter(r=>r[3]==='下班'&&new Date(r[0]).toLocaleDateString('zh-TW')===today).length+'<span>人</span>';
      document.getElementById('adminRecords').innerHTML = rows.map(r=>`
        <div class="record-item">
          <div class="record-dot ${r[3]==='上班'?'dot-green':'dot-red'}"></div>
          <div class="record-info">
            <div class="record-type"><span class="badge ${r[3]==='上班'?'badge-green':'badge-red'}">${r[3]}</span> ${r[2]||''}（${r[1]}）</div>
            <div class="record-meta">${new Date(r[0]).toLocaleDateString('zh-TW')} ${r[6]?'📍'+r[6]+','+r[7]:''}</div>
          </div>
          <div class="record-time">${r[5]||''}</div>
        </div>`).join('');
    }
  } catch(e) {
    document.getElementById('pendingLoading').textContent = '（離線）';
    document.getElementById('adminRecords').innerHTML = records.map(r=>recordHTML(r,true)).join('');
    document.getElementById('statCheckin').innerHTML = records.filter(r=>r.type==='上班').length+'<span>人</span>';
    document.getElementById('statCheckout').innerHTML = records.filter(r=>r.type==='下班').length+'<span>人</span>';
  }
}

// ── Helpers ───────────────────────────────────────────────
function saveRecords() { localStorage.setItem('tjcpm_records', JSON.stringify(records)); }

function switchTab(tab) {
  const tabs = ['home','records','leave','overtime','notifications','admin'];
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='home') renderTodayList();
  if(tab==='records') renderAllList();
  if(tab==='notifications') renderNotifications();
  if(tab==='admin') loadAdminData();
}

function openModal(type) { document.getElementById('modal-'+type).classList.add('open'); }
function closeModal(type) { document.getElementById('modal-'+type).classList.remove('open'); }

let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});
</script>
</body>
</html>
